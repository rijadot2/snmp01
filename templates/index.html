<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SNMP Traffic Monitor</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
  <!-- jQuery for AJAX (simple, works everywhere) -->
  <script src="https://code.jquery.com/jquery-3.5.1.min.js" integrity="sha256-9/aliU8dGd2tb6OSsuzixeV4y/faTqgFtohetphbbj0=" crossorigin="anonymous"></script>
  <style>
    body { background-color: #121212; color: #eee; }
    .table thead th { border-bottom: 2px solid #333; }
    .badge-ok { background: #1b5e20; }
    .badge-bad { background: #b71c1c; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }
  </style>
</head>
<body>
  <div class="container-fluid py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3 class="mb-0">SNMP Traffic Monitor</h3>
      <div>
        <span class="mr-2">Refresh: <span class="mono" id="lastRefresh">—</span></span>
        <span id="statusBadge" class="badge badge-ok">OK</span>
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-dark table-striped table-bordered">
        <thead class="thead-dark">
          <tr>
            <th>IP</th>
            <th>Interface</th>
            <th>Alias</th>
            <th>Speed (bps)</th>
            <th>Inbound (Mbps)</th>
            <th>Outbound (Mbps)</th>
          </tr>
        </thead>
        <tbody id="tbody">
          <!-- Rows injected by JS -->
        </tbody>
      </table>
    </div>
  </div>

  <script>
    function format(val, decimals) {
      if (val === null || val === undefined || val === "") return "—";
      if (typeof val === "number") return val.toFixed(decimals || 0);
      return String(val);
    }

    function fetchData() {
      $("#statusBadge").removeClass("badge-bad").addClass("badge-ok").text("Loading...");
      $.ajax({
        url: "/api/traffic",
        method: "GET",
        cache: false,
        timeout: 20000
      }).done(function(resp) {
        var rows = resp && resp.data ? resp.data : [];
        var html = "";
        for (var i = 0; i < rows.length; i++) {
          var r = rows[i];
          var inClass = "text-success";
          var outClass = "text-info";
          var okBadge = r.ok ? '<span class="badge badge-ok">OK</span>' : '<span class="badge badge-bad">DOWN</span>';

          html += "<tr>";
          html += "<td class='mono'>" + (r.ip || "—") + " " + okBadge + "</td>";
          html += "<td>" + (r.ifDescr || "—") + "</td>";
          html += "<td>" + (r.ifAlias || "—") + "</td>";
          html += "<td class='mono'>" + (r.ifSpeed || "—") + "</td>";
          html += "<td class='mono " + inClass + "'>" + (r.in_mbps != null ? format(r.in_mbps, 4) : "—") + "</td>";
          html += "<td class='mono " + outClass + "'>" + (r.out_mbps != null ? format(r.out_mbps, 4) : "—") + "</td>";
          html += "</tr>";
        }
        $("#tbody").html(html);

        var now = new Date();
        $("#lastRefresh").text(now.toLocaleString());
        $("#statusBadge").removeClass("badge-bad").addClass("badge-ok").text("OK");
      }).fail(function() {
        $("#statusBadge").removeClass("badge-ok").addClass("badge-bad").text("ERROR");
      });
    }

    // First load
    fetchData();
    // Refresh every 10 seconds
    setInterval(fetchData, 10000);
  </script>
</body>
</html>
